#MODEL
model: "/workspace/Mask2Former/configs/coco/instance-segmentation/maskformer2_R50_bs16_50ep.yaml"
weights: "/workspace/autofish_training/mask2former/weights/r50.pkl"
output_dir: "/workspace/autofish_training/mask2former/output/training_test"

#TRAINING
train_dataset: ["autofish_train"]
val_dataset: ["autofish_val"]

dataloader_workers: 8
imgs_per_batch: 1
training_iters: 50
solver_steps: [25, 40, 45]
checkpoint_period: 250
learning_rate: 0.001

save_best_hook: {'register': False, 'metric': "total_val_loss", 'mode': "min"}
image_saver_hook: {'register': False, 'log_period': 10}

train_augmentations:
    hFlip: True
    hFlip_prob: 0.5
    vFlip: True
    vFlip_prob: 0.5
    rBrightness: True
    bright_min: 0.75
    bright_max: 1.25
    rContrast: True
    cont_min: 0.75
    cont_max: 1.25
    rSaturation: True
    sat_min: 0.75
    sat_max: 1.25
    resize: True
    scale: 0.3

#TESTING
test_dataset: ["autofish_test_mini"]
test_weights: "model_final.pth" #model_best.pth
no_of_predictions: 40
compute_AP: True
confusion_matrix: True
draw_predictions: True
draw_only_masks: False

test_augmentations:
      resize: True
      scale: 0.3

#DATASET
root_dir: "/workspace/autofish_dataset/"
test_split: [10, 14, 20, 21, 22]
val_split: [3, 24, 12]
train_split: [1, 2, 4, 5, 6, 7, 8, 9, 11, 13, 15, 16, 17, 18, 19, 23, 25]
label_configuration: "C1"
classes: ["whiting", "cod", "haddock", "hake", "horse_mackerel", "other"]
id_species_map:
  "whiting": 0
  "cod": 1
  "haddock": 2
  "hake": 3
  "horse_mackerel": 4
  "saithe": 5
  "other": 5
