# =============================================================================
# VFM variant of the AutoFish length regressor: the MobileNetV2 encoder is
# replaced by a Vision Foundation Model (DINOv2 ViT-S/14). The training recipe
# matches paper.cfg (same MLP head design, same [feat + normalized bbox] input,
# same RGB-masked bbox crop @224, same batch 32 / 200 epochs / Adam lr 1e-3 /
# L1 loss / group splits / color-only augmentation).
#
# HONEST SCOPE OF THE COMPARISON. Two things necessarily differ when the encoder
# is swapped, so a raw vfm.cfg-vs-paper.cfg gap is NOT attributable to the
# encoder alone:
#   1. Training regime: this config FREEZES the encoder (FREEZE_BACKEND: True,
#      only the head trains), whereas paper.cfg FINE-TUNES it. For the clean,
#      encoder-only comparison, compare vfm.cfg against baseline_frozen.cfg
#      (frozen MobileNetV2) — same regime, different encoder.
#   2. Input scaling / head width: DINOv2 receives ImageNet-normalized input
#      (applied inside the encoder) while the baseline receives raw [0,1]; and
#      the head's first Linear is 384+4 (DINOv2) vs 1280+4 (MobileNetV2). These
#      are inherent to swapping the encoder and are held as constant as possible.
#
# Why frozen is the PRIMARY VFM setting: using a VFM as a frozen feature
# extractor is the standard, strong protocol and the setting most relevant to
# the limited-data research question. (vfm_finetune.cfg provides the fine-tuned
# DINOv2 arm; note train.py's fixed Adam lr 1e-3 is high for ViT fine-tuning.)
#
# Runs in the authors' Docker container. First run downloads the DINOv2 weights
# via torch.hub (needs internet, like the baseline's MobileNetV2 weights).
# Launch from length_estimation/cnn/:  python train.py --config configs/vfm.cfg
# =============================================================================
[Config]
OUTPUT_DIR: ./output/cnn-vfm/
MASKS_GT: /workspace/autofish_dataset/annotations.json
TRAIN_GROUPS: [2, 3, 4, 5, 7, 8, 9, 12, 13, 15, 16, 18, 19, 23, 24]
VAL_GROUPS: [1, 6, 11, 17, 25]
TEST_GROUPS: [10, 14, 20, 21, 22]

[Training]
CACHE_IMAGES: True
NUM_EPOCHS: 200
BATCH_SIZE: 32
RANDOM_SEED: 42
LOSS: l1

[Preprocessing]
CROP_TO_BBOX: True
MASKING_TYPE: rgb

[Model]
MODEL_BACKEND: dinov2_vits14
FREEZE_BACKEND: True
MODEL_SIZE: small
MODEL_INPUT_PLANE: False
MODEL_INPUT_BBOX: True
NORMALIZE_BBOX: True

[Augmentation]
AUGMENT_COLOR_TRAIN_IMAGES: True
AUGMENT_CROP_TRAIN_IMAGES: False
