[Config]
# Quick pre-flight sanity check on the server (1 group, 1 epoch) before the
# full paper.cfg run. Uses the same Docker dataset mount path.
OUTPUT_DIR: ./output/cnn-smoke/
MASKS_GT: /workspace/autofish_dataset/annotations.json
TRAIN_GROUPS: [2]
VAL_GROUPS: [1]
TEST_GROUPS: [10]

[Training]
CACHE_IMAGES: True
NUM_EPOCHS: 1
BATCH_SIZE: 16
RANDOM_SEED: 42
LOSS: l1

[Preprocessing]
CROP_TO_BBOX: True
MASKING_TYPE: rgb

[Model]
MODEL_BACKEND: mobilenet_v2
FREEZE_BACKEND: False
MODEL_SIZE: small
MODEL_INPUT_PLANE: False
MODEL_INPUT_BBOX: True
NORMALIZE_BBOX: True

[Augmentation]
AUGMENT_COLOR_TRAIN_IMAGES: True
AUGMENT_CROP_TRAIN_IMAGES: False
