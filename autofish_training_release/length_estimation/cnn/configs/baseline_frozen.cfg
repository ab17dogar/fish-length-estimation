# =============================================================================
# Frozen-MobileNetV2 control. This is the apples-to-apples counterpart to
# vfm.cfg: BOTH freeze the encoder and train only the MLP head, so comparing
# baseline_frozen vs vfm isolates ENCODER QUALITY (MobileNetV2 vs DINOv2
# features) with the training regime held fixed. It is the clean answer to
# "does a VFM encoder help?".
#
# (paper.cfg keeps FREEZE_BACKEND: False = the fine-tuned baseline as published;
#  vfm_finetune.cfg is the fine-tuned DINOv2 arm. Together the four configs form
#  a {MobileNetV2, DINOv2} x {frozen, fine-tuned} matrix.)
#
# Identical to paper.cfg except FREEZE_BACKEND. Run from length_estimation/cnn/:
#   python train.py --config configs/baseline_frozen.cfg
# =============================================================================
[Config]
OUTPUT_DIR: ./output/cnn-baseline-frozen/
MASKS_GT: /workspace/autofish_dataset/annotations.json
TRAIN_GROUPS: [2, 3, 4, 5, 7, 8, 9, 12, 13, 15, 16, 18, 19, 23, 24]
VAL_GROUPS: [1, 6, 11, 17, 25]
TEST_GROUPS: [10, 14, 20, 21, 22]

[Training]
CACHE_IMAGES: True
NUM_EPOCHS: 200
BATCH_SIZE: 32
RANDOM_SEED: 42
LOSS: l1

[Preprocessing]
CROP_TO_BBOX: True
MASKING_TYPE: rgb

[Model]
MODEL_BACKEND: mobilenet_v2
FREEZE_BACKEND: True
MODEL_SIZE: small
MODEL_INPUT_PLANE: False
MODEL_INPUT_BBOX: True
NORMALIZE_BBOX: True

[Augmentation]
AUGMENT_COLOR_TRAIN_IMAGES: True
AUGMENT_CROP_TRAIN_IMAGES: False
