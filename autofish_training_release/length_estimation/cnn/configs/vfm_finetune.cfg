# =============================================================================
# Fine-tuned DINOv2 arm (the VFM "ceiling"). Same as vfm.cfg but the encoder is
# unfrozen (FREEZE_BACKEND: False), so the whole ViT is trained end-to-end.
#
# CAVEAT: train.py builds the optimizer as Adam with the default lr 1e-3 for ALL
# parameters (no per-group lr, and editing train.py is out of scope here). 1e-3
# is a large lr for fine-tuning a ViT and may degrade or destabilise the
# pretrained features; treat this arm's result as an as-is data point, not a
# tuned optimum. It completes the {frozen, fine-tuned} matrix and pairs with
# paper.cfg (fine-tuned MobileNetV2) for a fine-tuned-vs-fine-tuned comparison.
#
# Run from length_estimation/cnn/:
#   python train.py --config configs/vfm_finetune.cfg
# =============================================================================
[Config]
OUTPUT_DIR: ./output/cnn-vfm-finetune/
MASKS_GT: /workspace/autofish_dataset/annotations.json
TRAIN_GROUPS: [2, 3, 4, 5, 7, 8, 9, 12, 13, 15, 16, 18, 19, 23, 24]
VAL_GROUPS: [1, 6, 11, 17, 25]
TEST_GROUPS: [10, 14, 20, 21, 22]

[Training]
CACHE_IMAGES: True
NUM_EPOCHS: 200
BATCH_SIZE: 32
RANDOM_SEED: 42
LOSS: l1

[Preprocessing]
CROP_TO_BBOX: True
MASKING_TYPE: rgb

[Model]
MODEL_BACKEND: dinov2_vits14
FREEZE_BACKEND: False
MODEL_SIZE: small
MODEL_INPUT_PLANE: False
MODEL_INPUT_BBOX: True
NORMALIZE_BBOX: True

[Augmentation]
AUGMENT_COLOR_TRAIN_IMAGES: True
AUGMENT_CROP_TRAIN_IMAGES: False
