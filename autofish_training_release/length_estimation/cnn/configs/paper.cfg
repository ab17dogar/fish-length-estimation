# =============================================================================
# Paper-faithful reproduction of the AutoFish REG baseline (CNN length regressor)
# Bengtson et al., WACVW 2025 - Sec. 4.2.2 & Table 2.
#
# Encoder: ImageNet-pretrained MobileNetV2 (last classifier layer stripped),
# features concatenated with the 4 normalized bbox coords, then the MLP head
# Linear(1000)+BN+ReLU -> Linear(500)+BN+ReLU -> Linear(1).
# Optimizer: Adam, fixed lr 1e-3 (torch default, set in train.py). Loss: L1.
# Training: batch size 32, 200 epochs. Input: RGB-masked square bbox crop @224.
# Augmentation: color jitter only (no geometric, to preserve the px->cm mapping).
#
# Runs in the authors' Docker container (README workflow): the repo is mounted at
# /workspace/autofish_training and the dataset at /workspace/autofish_dataset,
# so the path below needs no editing. Launch from length_estimation/cnn/:
#   python train.py --config configs/paper.cfg
# =============================================================================
[Config]
OUTPUT_DIR: ./output/cnn-paper/
MASKS_GT: /workspace/autofish_dataset/annotations.json
TRAIN_GROUPS: [2, 3, 4, 5, 7, 8, 9, 12, 13, 15, 16, 18, 19, 23, 24]
VAL_GROUPS: [1, 6, 11, 17, 25]
TEST_GROUPS: [10, 14, 20, 21, 22]

[Training]
CACHE_IMAGES: True
NUM_EPOCHS: 200
BATCH_SIZE: 32
RANDOM_SEED: 42
LOSS: l1

[Preprocessing]
CROP_TO_BBOX: True
MASKING_TYPE: rgb

[Model]
MODEL_BACKEND: mobilenet_v2
FREEZE_BACKEND: False
MODEL_SIZE: small
MODEL_INPUT_PLANE: False
MODEL_INPUT_BBOX: True
NORMALIZE_BBOX: True

[Augmentation]
AUGMENT_COLOR_TRAIN_IMAGES: True
AUGMENT_CROP_TRAIN_IMAGES: False
