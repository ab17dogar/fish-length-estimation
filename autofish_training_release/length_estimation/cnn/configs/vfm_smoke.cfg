# Quick pre-flight sanity check for the VFM variant (1 group, 1 epoch) on the
# server, before the full vfm.cfg run. Verifies the DINOv2 encoder loads via
# torch.hub, the head wires up (384-d CLS token + 4 bbox coords), and a train
# step runs. Same Docker dataset mount path.
[Config]
OUTPUT_DIR: ./output/cnn-vfm-smoke/
MASKS_GT: /workspace/autofish_dataset/annotations.json
TRAIN_GROUPS: [2]
VAL_GROUPS: [1]
TEST_GROUPS: [10]

[Training]
CACHE_IMAGES: True
NUM_EPOCHS: 1
BATCH_SIZE: 16
RANDOM_SEED: 42
LOSS: l1

[Preprocessing]
CROP_TO_BBOX: True
MASKING_TYPE: rgb

[Model]
MODEL_BACKEND: dinov2_vits14
FREEZE_BACKEND: True
MODEL_SIZE: small
MODEL_INPUT_PLANE: False
MODEL_INPUT_BBOX: True
NORMALIZE_BBOX: True

[Augmentation]
AUGMENT_COLOR_TRAIN_IMAGES: True
AUGMENT_CROP_TRAIN_IMAGES: False
