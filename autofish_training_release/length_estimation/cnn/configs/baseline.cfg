# =============================================================================
# Reduced-budget baseline (10 epochs, batch 16) - the AutoFish README's
# quick-reproduction setting. For the full paper result use paper.cfg
# (200 epochs, batch 32). Docker dataset mount path.
# =============================================================================
[Config]
OUTPUT_DIR: ./output/cnn-baseline/
MASKS_GT: /workspace/autofish_dataset/annotations.json
TRAIN_GROUPS: [2, 3, 4, 5, 7, 8, 9, 12, 13, 15, 16, 18, 19, 23, 24]
VAL_GROUPS: [1, 6, 11, 17, 25]
TEST_GROUPS: [10, 14, 20, 21, 22]

[Training]
CACHE_IMAGES: True
NUM_EPOCHS: 10
BATCH_SIZE: 16
RANDOM_SEED: 42
LOSS: l1

[Preprocessing]
CROP_TO_BBOX: True
MASKING_TYPE: rgb

[Model]
MODEL_BACKEND: mobilenet_v2
FREEZE_BACKEND: False
MODEL_SIZE: small
MODEL_INPUT_PLANE: False
MODEL_INPUT_BBOX: True
NORMALIZE_BBOX: True

[Augmentation]
AUGMENT_COLOR_TRAIN_IMAGES: True
AUGMENT_CROP_TRAIN_IMAGES: False
